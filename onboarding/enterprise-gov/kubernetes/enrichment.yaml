apiVersion: apps/v1
kind: Deployment
metadata:
  name: xyo-enrichment
  namespace: xyo
  labels:
    app: xyo-enrichment
spec:
  replicas: 2 # Scale for high availability
  selector:
    matchLabels:
      app: xyo-enrichment
  template:
    metadata:
      labels:
        app: xyo-enrichment
    spec:
      imagePullSecrets:
        - name: syniol-registry-secret
      containers:
        - name: enrichment
          image: cr.syniol.com/xyo/enrichment:v1.2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 9091
              name: grpc
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: XYO_ORACLE_ADDR
              value: "xyo-oracle:9092"
            - name: XYO_YODA_ADDR
              value: "xyo-yoda:9093"
            - name: XYO_LOGOS_DIR
              value: "/var/lib/xyo/logos"
            - name: XYO_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: xyo-license-secret
                  key: license-key
          volumeMounts:
            - mountPath: /var/lib/xyo/logos
              name: xyo-logos-volume
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: xyo-logos-volume
          persistentVolumeClaim:
            claimName: xyo-logos-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: xyo-enrichment
  namespace: xyo
spec:
  ports:
    - port: 9091
      targetPort: 9091
  selector:
    app: xyo-enrichment
